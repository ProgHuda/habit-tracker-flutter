plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services" // Google Services Plugin
}

android {
    namespace = "com.zahn.habit_tracker_app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11   
        targetCompatibility = JavaVersion.VERSION_11  
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    defaultConfig {
        // Unique Application ID
        applicationId = "com.zahn.habit_tracker_app"
        // Update values to match your application needs.
        minSdkVersion 32
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // Add your own signing config for release builds.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Firebase BoM (Bill of Materials) for managing Firebase dependencies
    implementation platform('com.google.firebase:firebase-bom:33.7.0')
    implementation 'com.google.firebase:firebase-analytics'
}

// Apply the Google Services plugin after the dependencies block
apply plugin: 'com.google.gms.google-services'
